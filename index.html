<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Films App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="marvel-header">
        <img src="Marvel-Studios-logo-500x281.png" alt="studioBanner">
        <h1>🎬 Marvel Films & Series</h1>
        <p>Ontdek alle Marvel-films en -series</p>
    </header>

    <main>    
        <section class="controls">
            <input type="text" id="search" placeholder="Zoek op titel..." autocomplete="off">
        
            <select id="genre-filter">
                <option value="">Alle genres</option>
                <!-- Wordt dynamisch gevuld -->
            </select>

            <button id="sort-year">Sorteer op jaar ⬇️</button>
        </section>

        <!-- Laadindicator en foutmelding -->
        <div id="loading" class="loading" style="display: none;">Films laden...</div>
        <div id="error" class="error" style="display: none;"></div>

        <!-- Grid met filmkaarten -->
        <div id="movies-grid"  class="movies-grid"></div>
    </main>

    <script src="script.js"></script>

    <footer class="marvel-footer">
        <ul>
            <li class="footer_link">
                <a href="https://www.marvel.com/corporate/about">About marvel</a>
            </li>
            <li class="footer_link">
                <a href="https://www.marvel.com/corporate/about">Help</a>
            </li>
            <li class="footer_link">
                <a href="https://www.marvel.com/corporate/about">Careers</a>
            </li>
            <li class="footer_link">
                <a href="https://www.marvel.com/corporate/about">Advertising</a>
            </li>
        </ul>
        <img class="imageSM" src="Screenshot 2026-03-06 114735.png" alt="">
    </footer>
</body>
</html>
